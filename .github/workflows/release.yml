name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build release assets & update Homebrew formula
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Release

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.15.2
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Build release archives
        run: |
          set -euo pipefail

          mkdir -p dist

          build_archive() {
            target="$1"
            binary="$2"
            archive="$3"

            zig build -Dtarget="$target" -Doptimize=ReleaseFast

            package_dir="dist/${archive%.*}"
            package_dir="${package_dir%.tar}"
            rm -rf "$package_dir"
            mkdir -p "$package_dir"
            cp "zig-out/bin/$binary" "$package_dir/"

            if [[ "$archive" == *.zip ]]; then
              (cd dist && zip -qr "$archive" "$(basename "$package_dir")")
            else
              tar -C dist -czf "dist/$archive" "$(basename "$package_dir")"
            fi
          }

          build_archive "x86_64-linux-gnu" "zson" "zson-x86_64-linux-gnu.tar.gz"
          build_archive "x86_64-macos" "zson" "zson-x86_64-macos.tar.gz"
          build_archive "aarch64-macos" "zson" "zson-aarch64-macos.tar.gz"
          build_archive "x86_64-windows-gnu" "zson.exe" "zson-x86_64-windows-gnu.zip"

          (cd dist && sha256sum *.tar.gz *.zip > SHA256SUMS.txt)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*.tar.gz \
            dist/*.zip \
            dist/SHA256SUMS.txt

      - name: Compute tarball SHA256
        id: sha
        run: |
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.ref_name }}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "url=$URL"    >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}   # PAT with repo scope on homebrew-zson
        run: |
          VERSION="${{ github.ref_name }}"        # e.g. v0.2.0
          VERSION_BARE="${VERSION#v}"             # e.g.   0.2.0
          SHA="${{ steps.sha.outputs.sha256 }}"
          URL="${{ steps.sha.outputs.url }}"

          git clone https://x-access-token:${TAP_TOKEN}@github.com/melihbirim/homebrew-zson.git tap
          cd tap

          sed -i \
            -e "s|url \".*\"|url \"$URL\"|" \
            -e "s|sha256 \".*\"|sha256 \"$SHA\"|" \
            -e "s|version \".*\".*||" \
            Formula/zson.rb

          # Inject version line after the sha256 line (idempotent)
          sed -i "s|sha256 \"$SHA\"|sha256 \"$SHA\"\n  version \"$VERSION_BARE\"|" Formula/zson.rb

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/zson.rb
          git diff --cached --quiet || git commit -m "zson $VERSION_BARE"
          git push

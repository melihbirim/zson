name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint (zig fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.15.2
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Check formatting
        run: zig fmt --check src/ build.zig

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.15.2
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Run tests
        run: zig build test

  build:
    name: Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            target: x86_64-linux-gnu
            binary: zson
          - name: macos-x86_64
            target: x86_64-macos
            binary: zson
          - name: macos-aarch64
            target: aarch64-macos
            binary: zson
          - name: windows-x86_64
            target: x86_64-windows-gnu
            binary: zson.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.15.2
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Build (ReleaseFast)
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: zson-${{ matrix.name }}
          path: zig-out/bin/${{ matrix.binary }}
